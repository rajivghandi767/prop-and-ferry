name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

env:
  APP_NAME: "Prop & Ferry"
  REGISTRY: "ghcr.io"
  IMAGE_BACKEND: "rajivghandi767/prop-ferry-backend"
  IMAGE_FRONTEND: "rajivghandi767/prop-ferry-frontend"
  IMAGE_NGINX: "rajivghandi767/prop-ferry-nginx"
  DISCORD_SUCCESS_COLOR: "3066993"
  DISCORD_FAIL_COLOR: "15158332"

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      
      - name: Build & Test Backend (Python)
        run: |
          docker build -t prop-ferry-backend:test -f backend/Dockerfile ./backend
          docker run --rm prop-ferry-backend:test python manage.py test

      - name: Build & Test Frontend (React)
        run: |
          docker build -t prop-ferry-frontend:test -f frontend/Dockerfile ./frontend
          docker run --rm prop-ferry-frontend:test npm run test

  build-and-push:
    name: Build & Push Images
    needs: test
    runs-on: ubuntu-24.04-arm
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Git Commit
        id: git-commit
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and Push Backend
        run: |
          docker build -t ghcr.io/rajivghandi767/prop-ferry-backend:${{ github.run_number }} \
                       -t ghcr.io/rajivghandi767/prop-ferry-backend:latest \
                       --label git-commit=${{ steps.git-commit.outputs.short }} \
                       -f backend/Dockerfile.prod ./backend
          docker push ghcr.io/rajivghandi767/prop-ferry-backend --all-tags

      - name: Build and Push Frontend
        run: |
          docker build -t ghcr.io/rajivghandi767/prop-ferry-frontend:${{ github.run_number }} \
                       -t ghcr.io/rajivghandi767/prop-ferry-frontend:latest \
                       --label git-commit=${{ steps.git-commit.outputs.short }} \
                       --build-arg VITE_API_URL=/api \
                       -f frontend/Dockerfile.prod ./frontend
          docker push ghcr.io/rajivghandi767/prop-ferry-frontend --all-tags

      - name: Build and Push Nginx
        run: |
          docker build -t ghcr.io/rajivghandi767/prop-ferry-nginx:${{ github.run_number }} \
                       -t ghcr.io/rajivghandi767/prop-ferry-nginx:latest \
                       --label git-commit=${{ steps.git-commit.outputs.short }} \
                       ./nginx
          docker push ghcr.io/rajivghandi767/prop-ferry-nginx --all-tags

  notify:
    name: Discord Notification
    needs: [test, build-and-push]
    if: always()
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Notify Success
        if: ${{ needs.test.result == 'success' && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped') }}
        run: |
          printf -v DESC "Build **#${{ github.run_number }}** completed successfully.\n[View GitHub Actions Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          PAYLOAD=$(jq -n --arg title "✅ ${{ env.APP_NAME }} Build Success" \
                          --arg desc "$DESC" \
                          --argjson color ${{ env.DISCORD_SUCCESS_COLOR }} \
                          '{embeds: [{title: $title, description: $desc, color: $color}]}')
          curl -s --max-time 10 -H "Content-Type: application/json" -X POST -d "$PAYLOAD" ${{ secrets.DISCORD_WEBHOOK_URL_GITHUB }} || true
          
      - name: Notify Failure
        if: ${{ contains(needs.*.result, 'failure') }}
        run: |
          printf -v DESC "Check GitHub Actions logs for build **#${{ github.run_number }}**.\n[View GitHub Actions Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          PAYLOAD=$(jq -n --arg title "🚨 ${{ env.APP_NAME }} Build Failed" \
                          --arg desc "$DESC" \
                          --argjson color ${{ env.DISCORD_FAIL_COLOR }} \
                          '{embeds: [{title: $title, description: $desc, color: $color}]}')
          curl -s --max-time 10 -H "Content-Type: application/json" -X POST -d "$PAYLOAD" ${{ secrets.DISCORD_WEBHOOK_URL_GITHUB }} || true
